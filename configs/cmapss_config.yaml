# C-MAPSS LSTM Configuration

# Data parameters
input_size: 21          # number of sensor + setting features per timestep
window_size: 50         # sliding-window length fed to the LSTM

# LSTM architecture
hidden_size: 64
num_layers: 2
dropout: 0.2

# Training
learning_rate: 0.001
batch_size: 64
num_epochs: 50
seed: 42
val_split: 0.15

# RUL cap — values above this are clipped so the model focuses on the
# near-failure region where the RUL-vs-sensor relationship is reliable
# (standard practice for NASA C-MAPSS benchmarks).
rul_cap: 125

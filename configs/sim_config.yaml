# PyBullet Simulation Configuration

# Joint to drive with sine wave.
# joint_index 3 is the fourth joint on the KUKA IIWA and gives a visible
# elbow-like swing without colliding with the base.  May need adjusting
# after the first visual test — check the GUI window.
joint_index: 3

# Sine-wave motion parameters
amplitude_rad: 0.6        # half-range in radians
frequency_hz: 0.2         # oscillations per second

# Physics
sim_timestep: 0.0041666   # 1/240 s — PyBullet's default physics step

# Phase 2 duration (short demo run)
num_steps: 1000

# Logging (Phase 2)
log_path: "outputs/logs/phase2_joint_readout.csv"

# --- Phase 3: Synthetic degradation ---
degradation:
  base_damping: 0.05       # initial joint damping (N·m·s/rad)
  max_damping: 50.0        # damping at end-of-life (must overwhelm motor kp)
  degradation_power: 3     # >1 = accelerating wear; higher = sharper late-stage curve
  total_cycles: 300        # one cycle = one full sine period of the joint
  output_csv: "data/synthetic/joint_degradation_log.csv"
